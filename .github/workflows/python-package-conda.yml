name: Python Package using Conda

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Add conda to system path
        run: echo "$CONDA/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          conda install -y fastapi uvicorn pydantic pytest flake8

      - name: Lint with flake8
        run: |
          flake8 SimpleRESTAPI --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 SimpleRESTAPI --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest
          else
            echo "No tests found, skipping pytest."
          fi
            
